name: Deploy Angular App to GitHub Pages

# ── Trigger: when to run this workflow ─────────────────────────────────
on:
  push:
    branches:
      - main
    paths:
      - 'music-festival-planner/**'
      - '.github/workflows/**'
  workflow_dispatch:

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: "true"

# ── Permissions: what GitHub token is allowed to do ────────────────────
permissions:
  contents: read
  pages: write
  id-token: write

# ── Concurrency: prevent overlapping deployments ───────────────────────
concurrency:
  group: pages
  cancel-in-progress: false

# ── Defaults: set working directory for all run steps ──────────────────
defaults:
  run:
    working-directory: music-festival-planner

# ── Jobs ────────────────────────────────────────────────────────────────
jobs:

  build:
    runs-on: ubuntu-latest
    steps:

      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 24
          cache: npm
          cache-dependency-path: music-festival-planner/package-lock.json

      - name: Install dependencies
        run: npm ci

      - name: Build Angular app
        run: npm run build -- --configuration production --base-href "/${{ github.event.repository.name }}/"

      - name: Upload Pages artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: music-festival-planner/dist/music-festival-planner/browser

  deploy:
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4